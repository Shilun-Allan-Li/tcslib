on:
  push:
    branches:
      - main
      - verso_webpage

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  style_lint:
    name: Lint style
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Don't 'import Mathlib', use precise imports
        if: always()
        run: |
          ! (find TCSlib -name "*.lean" -type f -print0 | xargs -0 grep -E -n '^import Mathlib$')

  build_project:
    runs-on: ubuntu-latest
    name: Build project and deploy
    steps:
      - name: Checkout project
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install elan
        run: curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain leanprover/lean4:4.0.0

      - name: Get cache
        run: ~/.elan/bin/lake -Kenv=dev exe cache get || true

      - name: Build project
        run: ~/.elan/bin/lake -Kenv=dev build TCSlib

      - name: Cache mathlib docs
        uses: actions/cache@v4
        with:
          path: |
            .lake/build/doc/Init
            .lake/build/doc/Lake
            .lake/build/doc/Lean
            .lake/build/doc/Std
            .lake/build/doc/Mathlib
            .lake/build/doc/declarations
            !.lake/build/doc/declarations/declaration-data-TCSlib*
          key: MathlibDoc-${{ hashFiles('lake-manifest.json') }}
          restore-keys: |
            MathlibDoc-

      - name: Build documentation
        run: ~/.elan/bin/lake -Kenv=dev build TCSlib:docs

      - name: Build blueprint
        uses: xu-cheng/texlive-action@v2
        with:
          docker_image: ghcr.io/xu-cheng/texlive-full:20231201
          run: |
            export PIP_BREAK_SYSTEM_PACKAGES=1
            apk update
            apk add --update make py3-pip git
            apk add --update make py3-pip git pkgconfig graphviz graphviz-dev gcc musl-dev
            git config --global --add safe.directory $GITHUB_WORKSPACE
            git config --global --add safe.directory `pwd`
            python3 -m pip install --upgrade pip requests wheel
            CFLAGS="-I/usr/include/graphviz" LDFLAGS="-L/usr/lib/graphviz/ -R/usr/lib/graphviz/" python3 -m pip install pygraphviz
            pip install -r blueprint/requirements.txt
            python3 -m pip install invoke
            inv all

      - name: Build Verso website
        run: |
          cd webpage
          ~/.elan/bin/lake exe generate-site

      - name: Assemble site
        run: |
          # Verso output is the root
          mv webpage/_site site_root
          # Blueprint goes to /blueprint/
          mkdir -p site_root/blueprint
          cp -r docs/blueprint/. site_root/blueprint/
          # doc-gen4 docs go to /docs/
          mkdir -p site_root/docs
          mv .lake/build/doc site_root/docs

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site_root

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Restore docs cache location
        run: mv site_root/docs .lake/build/doc
